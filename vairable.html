<!DOCTYPE html>
<html>
<head>
    <title>Variable dalam JavaScript</title>
</head>
<body>
    <script>
        document.writeln("<h1>Variable dalam JavaScript</h1>");
        // Mendeklarasikan variabel
        var nama = "John";
        var usia = 25;
        var isMahasiswa = true;

        // Menampilkan nilai variabel
        nama = "Ega Teja Pratama"; // Mengubah nilai variabel nama
        usia = 31; // Mengubah nilai variabel usia
        isMahasiswa = false; // Mengubah nilai variabel isMahasiswa
        document.writeln("Nama: " + nama);
        document.writeln("Usia: " + usia);
        document.writeln("Apakah mahasiswa: " + isMahasiswa);
    </script>
</body>
</html>
