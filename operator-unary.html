<!DOCTYPE html>
<html>
<head>
    <title>Javascript Operator Unary</title>
</head>
<body>
    <script>
        document.writeln("<h1>Operator Unary dalam JavaScript</h1>");
        // Mendeklarasikan variabel
        var a = 10;
        var b = 5;
        document.writeln("Nilai awal a: " + a);
        document.writeln("Nilai b: " + b);
        document.writeln("<br>"); // Menambahkan baris baru

        // Operator Unary
        a++; // Sama dengan a = a + 1
        document.writeln("Nilai a setelah ++: " + a);

        a--; // Sama dengan a = a - 1
        document.writeln("Nilai a setelah --: " + a);
    </script>
</body>
</html>
