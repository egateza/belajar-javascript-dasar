<html>
    <head>
        <title>Break Statement</title>
    </head>
    <body>
        <script>
            // Contoh penggunaan break statement
            document.writeln("<h2>Break Statement</h2>");

            let counter = 1;
            while (true) {
                document.writeln(`<p>Iterasi ke-${counter}</p>`);
                counter++;

                // Menghentikan loop jika counter lebih besar dari 5
                if (counter > 5) {
                    break;
                }

            }
        </script>
    </body>
</html>
