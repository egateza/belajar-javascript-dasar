<!DOCTYPE html>
<html>
<head>
    <title>Javascript Operator Augmented Assignment</title>
</head>
<body>
    <script>
        document.writeln("<h1>Operator Augmented Assignment dalam JavaScript</h1>");
        // Mendeklarasikan variabel
        var a = 10;
        var b = 5;
        document.writeln("Nilai awal a: " + a);
        document.writeln("Nilai b: " + b);
        document.writeln("<br>"); // Menambahkan baris baru

        // Operator Augmented Assignment
        a += b; // Sama dengan a = a + b
        document.writeln("Nilai a setelah +=: " + a);

        a -= b; // Sama dengan a = a - b
        document.writeln("Nilai a setelah -=: " + a);

        a *= b; // Sama dengan a = a * b
        document.writeln("Nilai a setelah *=: " + a);

        a /= b; // Sama dengan a = a / b
        document.writeln("Nilai a setelah /=: " + a);

        a %= b; // Sama dengan a = a % b
        document.writeln("Nilai a setelah %=: " + a);
    </script>
</body>
</html>
