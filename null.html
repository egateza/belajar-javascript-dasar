<html>
    <head>
        <title>JavaScript Null Value</title>
    </head>
    <body>
        <script>
            // Contoh penggunaan nilai null
            let firstName = "Ega"; // Variabel ini memiliki nilai string
            if (firstName === null) {
                console.info("Variabel memiliki nilai null.");
            } else if (firstName === undefined) {
                console.info("Variabel belum didefinisikan.");
            } else {
                console.info(`Variabel memiliki nilai yang valid dan berisi: ${firstName}.`);
            }
        </script>
    </body>
</html>
