<!DOCTYPE html>
<html> 
<head>
    <title>Tipe Data Number dalam JavaScript</title>
</head>
<body>
    <script>
        document.writeln("<h1>Tipe Data Number dalam JavaScript</h1>");
        document.writeln(100); // Menampilkan angka 100
        document.writeln("<br>"); // Menambahkan baris baru
        document.writeln(3.14); // Menampilkan angka desimal 3.14
        document.writeln("<br>"); // Menambahkan baris baru
        document.writeln(0b1111011); // Menampilkan angka biner 123
        document.writeln("<br>"); // Menambahkan baris baru
        document.writeln(0o173); // Menampilkan angka oktal 123
        document.writeln("<br>"); // Menambahkan baris baru
        document.writeln(0x7B); // Menampilkan angka heksadesimal 123
    </script>
</html>
