<!DOCTYPE html>
<html>
<head>
    <title>Javascript Operator Aritmatika</title>
</head>
<body>
    <script>
        // Mendeklarasikan variabel
        var a = 10;
        var b = 5;
        document.writeln("<h1>Operator Aritmatika dalam JavaScript</h1>");
        document.writeln("Nilai a: " + a);
        document.writeln("Nilai b: " + b);
        document.writeln("<br>"); // Menambahkan baris baru
        

        // Operator Aritmatika
        var penjumlahan = a + b;
        var pengurangan = a - b;
        var perkalian = a * b;
        var pembagian = a / b;
        var modulus = a % b;

        // Menampilkan hasil
        document.writeln("Penjumlahan: " + penjumlahan);
        document.writeln("Pengurangan: " + pengurangan);
        document.writeln("Perkalian: " + perkalian);
        document.writeln("Pembagian: " + pembagian);
        document.writeln("Modulus: " + modulus);
    </script>
</body>
</html>
