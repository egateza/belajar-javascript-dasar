<html>
    <head>
        <title>JavaScript typeof Operator</title>
    </head>
    <body>
        <script>
            let firstName = "Ega";
            let age = 25;
            let isStudent = true;
            let hobbies = ["reading", "swimming"];
            let address = null;
            let phoneNumber;

            document.writeln("<h2>Contoh typeof Operator</h2>");
            document.writeln(`<p>firstName: ${typeof firstName}</p>`);
            document.writeln(`<p>age: ${typeof age}</p>`);
            document.writeln(`<p>isStudent: ${typeof isStudent}</p>`);
            document.writeln(`<p>hobbies: ${typeof hobbies}</p>`);
            document.writeln(`<p>address: ${typeof address}</p>`);
            document.writeln(`<p>phoneNumber: ${typeof phoneNumber}</p>`);
        </script>
    </body>
</html>
