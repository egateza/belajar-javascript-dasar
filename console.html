<!DOCTYPE html>
<html>
<head>
    <title>JavaScript Console</title>
</head>
<body>
    <script>
        document.writeln("<h1>JavaScript Console Example</h1>");
        document.write("This is a simple JavaScript console example.");
        document.write("<br>Check the browser console for the log message.");
        console.log("Hello, World!");
        console.warn("This is a warning message.");
        console.error("This is an error message.");
    </script>
</body>
</html>
