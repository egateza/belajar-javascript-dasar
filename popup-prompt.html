<html>
    <head>
        <title>Popup Prompt</title>
    </head>
    <body>
        <script>
            const name = prompt("Masukkan nama Anda:");
            if (name) {
                alert("Halo, " + name + "!");
            } else {
                alert("Anda tidak memasukkan nama.");
            }
        </script>
    </body>
</html>
