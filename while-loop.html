<html>
    <head>
        <title>While Loop</title>
    </head>
    <body>
        <script>
            // Contoh penggunaan while loop
            document.writeln("<h2>While Loop</h2>");

            let i = 1;
            while (i <= 5) {
                document.writeln(`<p>Iterasi ke-${i}</p>`);
                i++;
            }
        </script>
    </body>
</html>
