<html>
    <head>
        <title>For Loop</title>
    </head>
    <body>
        <script>
            // Contoh penggunaan for loop
            document.writeln("<h2>For Loop</h2>");

            for (let i = 1; i <= 5; i++) {
                document.writeln(`<p>Iterasi ke-${i}</p>`);
            }

            let counter = 1;
            for (; counter <= 10;) {
                alert(`Iterasi ke-${counter}`);
                counter++
            }
        </script>
    </body>
</html>
