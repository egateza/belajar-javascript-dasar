<html>
    <head>
        <title>Continue Statement</title>
    </head>
    <body>
        <script>
            // Contoh penggunaan continue statement
            document.writeln("<h2>Continue Statement</h2>");

            for (let i = 1; i <= 10; i++) {
                if (i % 2 === 0) {
                    continue; 
                }
                document.writeln(`<p>Perulangan Ganjil: ${i}</p>`);
            }
        </script>
    </body>
</html>
