<html>
    <head>
        <title>JavaScript Ternary Operator</title>
    </head>
    <body>
        <script>
            let age = 25;
            let isAdult = age >= 18 ? true : false;

            document.writeln("<h2>Contoh Ternary Operator</h2>");
            document.writeln(`<p>Usia: ${age}</p>`);
            document.writeln(`<p>Apakah dewasa? ${isAdult}</p>`);

            document.writeln("<h2>Contoh menggunakan if-else</h2>");
            if (age >= 18) {
                document.writeln("<p>Apakah dewasa? true</p>");
            } else {
                document.writeln("<p>Apakah dewasa? false</p>");
            }
        </script>
    </body>
</html>
