<!DOCTYPE html>
<html>
<head>
    <title>Javascript Operator Perbandingan</title>
</head>
<body>
    <script>
        document.writeln("<h1>Operator Perbandingan dalam JavaScript</h1>");
        // Mendeklarasikan variabel
        var a = 10;
        var b = 5;
        document.writeln("Nilai awal a: " + a);
        document.writeln("Nilai b: " + b);
        document.writeln("<br>"); // Menambahkan baris baru

        // Operator Perbandingan
        document.writeln("a == b: " + (a == b));
        document.writeln("a != b: " + (a != b));
        document.writeln("a > b: " + (a > b));
        document.writeln("a < b: " + (a < b));
        document.writeln("a >= b: " + (a >= b));
        document.writeln("a <= b: " + (a <= b));
    </script>
</body>
</html>
