<!DOCTYPE html>
<html>
<head>
    <title>Tipe Data String dalam JavaScript</title>
</head>
<body>
    <script>
        document.writeln("<h1>Tipe Data String dalam JavaScript</h1>");
        document.writeln('Ini adalah string dengan tanda kutip tunggal'); // Menampilkan string dengan menggunakan tanda kutip tunggal
        document.writeln("<br>"); // Menambahkan baris baru
        document.writeln("Ini adalah string dengan tanda kutip ganda"); // Menampilkan string dengan menggunakan tanda kutip ganda
        document.writeln("<br>"); // Menambahkan baris baru
        document.writeln("<textarea cols='100' rows='10'>Ini adalah string dengan menggunakan backticks (template literals) \n"); // Menampilkan string dengan menggunakan backticks (template literals)
        document.writeln("String dengan tanda kutip di dalamnya: \"Ini adalah string dengan tanda kutip ganda di dalamnya\" \n"); // Menampilkan string dengan tanda kutip ganda di dalamnya
        document.writeln('String dengan tanda kutip di dalamnya: \'Ini adalah string dengan tanda kutip tunggal di dalamnya\' \n'); // Menampilkan string dengan tanda kutip tunggal di dalamnya
        document.writeln("String dengan karakter khusus: \"Baris baru\\nTab\\tBackslash\\\\\" \n"); // Menampilkan string dengan karakter khusus
        document.writeln("</textarea>");
    </script>
</body>
</html>
