<html>
    <head>
        <title>Javascript If Expression</title>
    </head>
    <body>
        <script>
            document.writeln("<h1>Javascript If Expression</h1>");
            document.writeln("<h2>Contoh if expression:</h2>");
            const examValue = 65;
            document.writeln("<p>Exam Value: " + examValue + "</p>");
            if (examValue > 70) {
                document.writeln("<p>Anda lulus dengan nilai yang sangat baik.</p>");
            } else if (examValue > 60) {
                document.writeln("<p>Anda lulus dengan nilai yang cukup.</p>");
            } else {
                document.writeln("<p>Anda tidak lulus.</p>");
            }
        </script>
    </body>
</html>
