<html>
    <head>
        <title>Do-While Loop</title>
    </head>
    <body>
        <script>
            // Contoh penggunaan do-while loop
            document.writeln("<h2>Do-While Loop</h2>");

            let i = 1;
            do {
                document.writeln(`<p>Iterasi ke-${i}</p>`);
                i++;
            } while (i <= 5);
        </script>
    </body>
</html>
