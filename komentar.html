<!DOCTYPE html>
<html>
<head>
    <title>Komentar dalam JavaScript</title>

</head>
<body>
    <script>
        // Ini adalah komentar satu baris
        document.writeln("<p>Komentar satu baris telah dijalankan.</p>");

        /*
         * Ini adalah komentar
         * multi-baris
         */
        document.writeln("Komentar multi-baris telah dijalankan.");
    </script>
</body>
</html>
