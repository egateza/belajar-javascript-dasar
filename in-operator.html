<html>
    <head>
        <title>JavaScript in Operator</title>
    </head>
    <body>
        <script>
            let person = {
                firstName: "Ega",
                lastName: "Pratama",
                age: 25
            };

            document.writeln("<h2>Contoh in Operator</h2>");
            document.writeln(`<p>"firstName" in person: ${"firstName" in person}</p>`);
            document.writeln(`<p>"lastName" in person: ${"lastName" in person}</p>`);
            document.writeln(`<p>"age" in person: ${"age" in person}</p>`);
            document.writeln(`<p>"email" in person: ${"email" in person}</p>`);
        </script>
    </body>
</html>
